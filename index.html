<!DOCTYPE html>
<html>

<head>
  <title>AI Slide Generator</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      text-align:center;
      background:#f5f5f5;
    }

    h1{
      margin-top:40px;
    }

    input{
      padding:10px;
      width:250px;
      font-size:16px;
    }

    button{
      padding:10px 15px;
      font-size:16px;
      cursor:pointer;
    }

    #slides{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      margin-top:40px;
    }

    .slide{
      width:300px;
      background:white;
      border-radius:10px;
      padding:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      text-align:left;
    }

    .slide h3{
      margin-top:0;
    }
  </style>

</head>

<body>

<h1>AI Presentation Generator</h1>

<input id="topic" placeholder="Enter presentation topic">

<button onclick="generateSlides()">Generate Slides</button>

<div id="slides"></div>

<script src="app.js"></script>

</body>

</html>
